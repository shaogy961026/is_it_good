<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新楓之谷 結合方塊/結合附加方塊分析</title>
    <meta name="description" content="專為《新楓之谷》打造的結合方塊與結合附加方塊計算機。可自訂裝備部位、目標進度與可接受的詞條，精準計算洗煉出指定潛能組合的成功機率與期望消耗方塊數量，助您評估裝備製作成本。">
    <style>
        :root {
            /* 明亮主題配色 */
            --bg-color: #f4f7f6;
            --panel-bg: #ffffff;
            --text-main: #2d3436;
            --text-accent: #d63031;
            --border-color: #dfe6e9;
            --btn-color: #0984e3;
            --btn-hover: #74b9ff;
            --leg-color: #009432;
            --unique-color: #e1b12c;
            --highlight-color: #0056b3;
        }
        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: var(--panel-bg);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 900px;
            border: 1px solid var(--border-color);
            margin: 0 auto; /* 確保計算機在頁面中置中，避免被其他元素擠壓 */
        }
        h1 {
            text-align: center;
            color: var(--text-main);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: var(--text-main);
        }
        select {
            width: 100%;
            padding: 10px;
            background-color: var(--panel-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 5px;
            font-size: 16px;
        }
        .pool-section {
            background-color: #fafafa;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .pool-title {
            font-weight: bold;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px dashed var(--border-color);
        }
        .pool-leg { color: var(--leg-color); }
        .pool-unique { color: var(--unique-color); }
        
        .checkbox-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 10px;
        }
        .checkbox-item {
            display: flex;
            align-items: center;
            font-size: 14px;
        }
        .checkbox-item input {
            margin-right: 8px;
            accent-color: var(--btn-color);
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: var(--btn-color);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-bottom: 20px;
        }
        button:hover {
            background-color: var(--btn-hover);
        }
        .result-box {
            padding: 20px;
            background-color: #f8f9fa;
            border-left: 5px solid var(--text-accent);
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .result-title {
            font-size: 20px;
            font-weight: bold;
            color: var(--text-accent);
            margin-bottom: 10px;
        }
        .result-text {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 5px;
        }
        .highlight {
            color: var(--highlight-color);
            font-weight: bold;
        }
        
        /* 表格樣式 */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 14px;
        }
        th, td {
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            text-align: left;
        }
        th {
            background-color: #f1f2f6;
            color: var(--text-main);
            position: sticky;
            top: 0;
        }
        .table-container {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 5px;
        }
        .row-leg td:first-child { color: var(--leg-color); font-weight: bold; }
        .row-unique td:first-child { color: var(--unique-color); font-weight: bold; }
    </style>
</head>
<body>
<div id="global-nav"></div>
<script>window.TOOL_ID = 20;</script>
<script src="../shared-nav.js"></script>
<script src="../shared-subtitle.js"></script>
<div class="container">
    <h1>新楓之谷 結合方塊/結合附加方塊分析</h1>
    <div id="tool-subtitle"></div>
    
    <div class="form-group">
        <label>方塊種類</label>
        <select id="cubeType" onchange="updateUI()">
            <option value="main">結合方塊 (潛在能力)</option>
            <option value="bonus">結合附加方塊 (附加潛在能力)</option>
        </select>
    </div>

    <div class="form-group">
        <label>裝備部位</label>
        <select id="equipPart" onchange="updateUI()">
            </select>
    </div>

    <div class="form-group">
        <label>目標進度</label>
        <select id="goalType">
            <option value="1">目前 2 排，需洗出剩下 1 排 (期望顆數 = 3 / P)</option>
            <option value="2">目前 1 排，需洗出剩下 2 排 (期望顆數 = 4.5 / P)</option>
            <option value="3">目前 0 排，需洗出剩下 3 排 (期望顆數 = 5.5 / P)</option>
        </select>
    </div>

    <div class="form-group">
        <label>請勾選可接受的目標詞條 (多選視為 OR)</label>
        
        <div class="pool-section">
            <div class="pool-title pool-leg">🟢 傳說等級 (Legendary)</div>
            <div class="checkbox-grid" id="legCheckboxes"></div>
        </div>

        <div class="pool-section">
            <div class="pool-title pool-unique">🟡 罕見等級 (Unique)</div>
            <div class="checkbox-grid" id="uniqueCheckboxes"></div>
        </div>
    </div>

    <button onclick="calculate()">計算機率與期望值</button>

    <div id="resultArea" class="result-box" style="display:none;"></div>

    <div class="form-group">
        <label style="border-top: 2px dashed #dfe6e9; padding-top: 20px;">當前部位完整機率表</label>
        <div class="table-container">
            <table id="probTable">
                <thead>
                    <tr>
                        <th>等級</th>
                        <th>詞條名稱</th>
                        <th>機率</th>
                    </tr>
                </thead>
                <tbody id="probTableBody">
                    </tbody>
            </table>
        </div>
    </div>
</div>

// 徹底改寫演算法：將重複項目完全獨立，保存為陣列
function restoreExactWeights(rawArray) {
    let bestTotalW = 1;
    let minError = Infinity;
    let bestWeights = [];

    for (let D = 1; D <= 3000; D++) {
        let currentError = 0;
        let tempWeights = [];
        let sumW = 0;
        
        for (let i = 0; i < rawArray.length; i++) {
            let targetRatio = rawArray[i][1] / 10000;
            let w = Math.round(targetRatio * D);
            tempWeights.push({ name: rawArray[i][0], w: w, original: rawArray[i][1] });
            sumW += w;
        }
        
        if (sumW === 0) continue;
        
        for (let i = 0; i < tempWeights.length; i++) {
            let targetRatio = tempWeights[i].original / 10000;
            let actualRatio = tempWeights[i].w / sumW;
            currentError += Math.abs(targetRatio - actualRatio);
        }
        
        if (currentError < minError) {
            minError = currentError;
            bestTotalW = sumW;
            bestWeights = tempWeights;
            if (currentError < 0.00001) break; // 找到完美分母
        }
    }
    return { total: bestTotalW, items: bestWeights };
}

let processedDB = { main: { leg: {}, unique: {} }, bonus: { leg: {}, unique: {} } };

function initDB() {
    ['main', 'bonus'].forEach(cube => {
        ['leg', 'unique'].forEach(tier => {
            for (let [cat, rawArray] of Object.entries(DB[cube][tier])) {
                processedDB[cube][tier][cat] = restoreExactWeights(rawArray);
            }
        });
    });
}

function updateUI() {
    const cubeType = document.getElementById("cubeType").value;
    const equipSelect = document.getElementById("equipPart");
    const currentEquip = equipSelect.value;
    
    equipSelect.innerHTML = "";
    Object.keys(equipMapping[cubeType]).forEach(part => {
        let opt = document.createElement("option");
        opt.value = part;
        opt.textContent = part;
        equipSelect.appendChild(opt);
    });
    
    if (equipMapping[cubeType][currentEquip]) {
        equipSelect.value = currentEquip;
    }

    updateCheckboxesAndTable();
}

function updateCheckboxesAndTable() {
    const cubeType = document.getElementById("cubeType").value;
    const equipPart = document.getElementById("equipPart").value;
    const map = equipMapping[cubeType][equipPart];
    
    const legPool = processedDB[cubeType].leg[map.l];
    const uniquePool = processedDB[cubeType].unique[map.u];
    
    const legContainer = document.getElementById("legCheckboxes");
    const uniqueContainer = document.getElementById("uniqueCheckboxes");
    const tableBody = document.getElementById("probTableBody");
    
    legContainer.innerHTML = "";
    uniqueContainer.innerHTML = "";
    tableBody.innerHTML = "";
    
    // 改用陣列 index 避免 id 重複
    legPool.items.forEach((item, index) => {
        let prob = ((item.w / legPool.total) * 100).toFixed(2);
        
        let div = document.createElement("div");
        div.className = "checkbox-item";
        div.innerHTML = `<input type="checkbox" id="leg_${index}" value="${index}"><label for="leg_${index}">${item.name}</label>`;
        legContainer.appendChild(div);

        let tr = document.createElement("tr");
        tr.className = "row-leg";
        tr.innerHTML = `<td>傳說</td><td>${item.name}</td><td>${prob}% (${item.w}/${legPool.total})</td>`;
        tableBody.appendChild(tr);
    });

    uniquePool.items.forEach((item, index) => {
        let prob = ((item.w / uniquePool.total) * 100).toFixed(2);
        
        let div = document.createElement("div");
        div.className = "checkbox-item";
        div.innerHTML = `<input type="checkbox" id="uni_${index}" value="${index}"><label for="uni_${index}">${item.name}</label>`;
        uniqueContainer.appendChild(div);

        let tr = document.createElement("tr");
        tr.className = "row-unique";
        tr.innerHTML = `<td>罕見</td><td>${item.name}</td><td>${prob}% (${item.w}/${uniquePool.total})</td>`;
        tableBody.appendChild(tr);
    });
}

function calculate() {
    const cubeType = document.getElementById("cubeType").value;
    const equipPart = document.getElementById("equipPart").value;
    const goalType = parseInt(document.getElementById("goalType").value);
    
    const map = equipMapping[cubeType][equipPart];
    const legPool = processedDB[cubeType].leg[map.l];
    const uniquePool = processedDB[cubeType].unique[map.u];
    
    let legHitWeight = 0;
    let uniqueHitWeight = 0;
    
    // 透過 value 抓取陣列內的正確權重
    document.querySelectorAll("#legCheckboxes input:checked").forEach(chk => {
        legHitWeight += legPool.items[parseInt(chk.value)].w;
    });
    document.querySelectorAll("#uniqueCheckboxes input:checked").forEach(chk => {
        uniqueHitWeight += uniquePool.items[parseInt(chk.value)].w;
    });

    if (legHitWeight === 0 && uniqueHitWeight === 0) {
        alert("請至少在傳說或罕見區選擇一個目標詞條！");
        return;
    }

    let pLeg = legHitWeight / legPool.total;
    let pUnique = uniqueHitWeight / uniquePool.total;
    let weightLegTier = DB[cubeType].legWeight;
    let weightUniqueTier = DB[cubeType].uniqueWeight;
    
    let overallHitRate = (weightLegTier * pLeg) + (weightUniqueTier * pUnique);
    
    let expectedCubes = 0;
    if (goalType === 1) {
        expectedCubes = 3 / overallHitRate;
    } else if (goalType === 2) {
        expectedCubes = 4.5 / overallHitRate;
    } else if (goalType === 3) {
        expectedCubes = 5.5 / overallHitRate;
    }

    const resBox = document.getElementById("resultArea");
    resBox.style.display = "block";
    
    let legTierPct = weightLegTier * 100;
    let uniqueTierPct = weightUniqueTier * 100;
    let overallPercent = (overallHitRate * 100).toFixed(4);

    resBox.innerHTML = `
        <div class="result-title">計算結果分析</div>
        <div class="result-text">
            單排命中率 P = (${legTierPct}% × ${legHitWeight}/${legPool.total}) + (${uniqueTierPct}% × ${uniqueHitWeight}/${uniquePool.total}) = <span class="highlight">${overallPercent}%</span>
        </div>
        <div class="result-text" style="font-size: 22px; margin-top: 10px;">
            達成目標平均期望消耗：<span class="highlight">${Math.ceil(expectedCubes).toLocaleString()}</span> 顆
            <span style="font-size: 14px; color: #888;">(未進位精確值: ${expectedCubes.toFixed(2)})</span>
        </div>
    `;
}

// localStorage 儲存機制
// ==========================================
const _SK20 = 'tool20_settings';

function _save20() {
    const legChecked = Array.from(document.querySelectorAll('#legCheckboxes input:checked')).map(el => el.value);
    const uniChecked = Array.from(document.querySelectorAll('#uniqueCheckboxes input:checked')).map(el => el.value);
    localStorage.setItem(_SK20, JSON.stringify({
        cubeType:  document.getElementById('cubeType').value,
        equipPart: document.getElementById('equipPart').value,
        goalType:  document.getElementById('goalType').value,
        legChecked, uniChecked
    }));
}

function _load20() {
    const raw = localStorage.getItem(_SK20);
    if (!raw) return;
    try {
        const s = JSON.parse(raw);
        if (s.cubeType) {
            document.getElementById('cubeType').value = s.cubeType;
            updateUI();
        }
        if (s.equipPart) {
            const equipSel = document.getElementById('equipPart');
            if ([...equipSel.options].some(o => o.value === s.equipPart)) {
                equipSel.value = s.equipPart;
                updateCheckboxesAndTable();
            }
        }
        if (s.goalType) document.getElementById('goalType').value = s.goalType;
        if (s.legChecked) s.legChecked.forEach(v => { const el = document.getElementById(`leg_${v}`); if (el) el.checked = true; });
        if (s.uniChecked) s.uniChecked.forEach(v => { const el = document.getElementById(`uni_${v}`); if (el) el.checked = true; });
    } catch(e) {}
}

initDB();
updateUI();
_load20();

document.getElementById('cubeType').addEventListener('change', _save20);
document.getElementById('equipPart').addEventListener('change', _save20);
document.getElementById('goalType').addEventListener('change', _save20);
document.getElementById('legCheckboxes').addEventListener('change', _save20);
document.getElementById('uniqueCheckboxes').addEventListener('change', _save20);
</script>
